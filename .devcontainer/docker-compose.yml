services:
  sensei:
    image: mcr.microsoft.com/devcontainers/java:1-21-bullseye
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sensei
    ports:
      - "5432:5432"